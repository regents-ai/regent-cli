version: 1
product: shared-services
x-regent-capability:
  status: beta
  owner: shared-services
  money_path: true
  cli_surface: true
  mobile_surface: false
help:
  story: >
    A Regent identity is a saved Agent account. An Agent account is a wallet plus
    registry address plus token ID. Protected shared commands use
    `regents auth login --audience regent-services`, then `regents identity ensure`,
    then the command.
  output_modes:
    human: Panels, tables, status lines, examples, and next-step hints.
    json: Raw JSON for scripts when `--json` is supported or stdout is not a terminal.
  terminal_constraints:
    - Honor NO_COLOR.
    - Avoid rich formatting for non-TTY output and TERM=dumb.
    - Keep command-level help scoped to the requested command group.
x-regent-chat-room-contract:
  owner: regents-cli
  local_xmtp_authority: CLI owns local XMTP identity, local policy files, and raw XMTP group operations.
  product_room_authority: Product room keys and membership rules stay in Platform, Autolaunch, and Techtree contracts.
  thread_identifier_boundary:
    xmtp_group_commands: conversation_id
    techtree_chatbox_commands: Techtree route selectors webapp and agent
  transport_boundary: CLI xmtp commands manage local XMTP transport. CLI chatbox commands use Techtree product routes or local runtime transport.
command_groups:
  - name: operator
    interface: runtime
    auth_mode: none
    output_envelope: operator-status-envelopes
    agent_metadata:
      category: local-control
      prompt_behavior: never_prompt
      json_support: supported
      mutation_class: local-read-or-write
      retry_behavior: safe_for_reads
      pagination: bounded
      async_behavior: synchronous
      input_mode: args-and-flags
      examples:
        - regents status
        - regents setup skills
        - regents agent-context
        - regents config get
        - regents agent profile get
      commands:
        setup skills:
          category: local-setup
          prompt_behavior: never_prompt
          json_support: supported
          mutation_class: local-write
          retry_behavior: safe
          pagination: none
          async_behavior: synchronous
          input_mode: flags
          examples:
            - regents setup skills
            - regents setup skills --project
    commands:
      - init
      - status
      - whoami
      - balance
      - agent-context
      - setup skills
      - run
      - config get
      - config write
      - create init
      - create wallet
      - agent init
      - agent status
      - agent profile list
      - agent profile get
      - agent harness list
      - gossipsub status
    flags:
      whoami:
        - name: --full
          type: boolean
          required: false
          description: Include the saved Platform account projection when a Platform session is present.
      setup skills:
        - name: --project
          type: boolean
          required: false
          description: Install skills into the current project instead of the global user skill set.
        - name: --json
          type: boolean
          required: false
          description: Print the installed skill summary as JSON.
  - name: wallet
    interface: runtime
    auth_mode: none
    output_envelope: loose-object
    agent_metadata:
      category: wallet
      prompt_behavior: prompt_when_creating_wallet
      json_support: supported
      mutation_class: local-read-or-write
      retry_behavior: safe_for_status
      pagination: none
      async_behavior: synchronous
      input_mode: flags
      examples:
        - regents wallet status
    commands:
      - wallet status
      - wallet setup
  - name: identity
    interface: runtime
    auth_mode: none
    output_envelope: loose-object
    agent_metadata:
      category: identity
      prompt_behavior: prompt_when_signing
      json_support: supported
      mutation_class: local-read-or-write
      retry_behavior: retry_after_user_action
      pagination: none
      async_behavior: synchronous
      input_mode: flags
      examples:
        - regents identity status
        - regents identity graph --json
    commands:
      - identity status
      - identity ensure
      - identity graph
    flags:
      graph:
        - name: --json
          type: boolean
          required: false
          description: Print the current identity graph as JSON for automation.
  - name: auth
    interface: http
    auth_mode: none
    output_envelope: loose-object
    agent_metadata:
      category: auth
      prompt_behavior: prompt_when_signing
      json_support: supported
      mutation_class: session-write
      retry_behavior: retry_after_user_action
      pagination: none
      async_behavior: synchronous
      input_mode: flags
      examples:
        - regents auth status
        - regents auth login --audience regent-services
    commands:
      - auth login
      - auth status
      - auth logout
    path_templates:
      - /v1/agent/siwa/nonce
      - /v1/agent/siwa/verify
  - name: mcp
    interface: runtime
    auth_mode: none
    output_envelope: loose-object
    agent_metadata:
      category: integration
      prompt_behavior: never_prompt
      json_support: supported
      mutation_class: local-read
      retry_behavior: safe
      pagination: none
      async_behavior: synchronous
      input_mode: args
      examples:
        - regents mcp export hermes
    commands:
      - mcp export hermes
  - name: feynman
    interface: local-process
    auth_mode: none
    output_envelope: passthrough
    note: Launches the installed Feynman research shell from Regents CLI. Feynman keeps its own setup and sessions under its normal local folder.
    agent_metadata:
      category: local-tool
      prompt_behavior: may_prompt
      json_support: not_supported
      mutation_class: local-process
      retry_behavior: manual
      pagination: none
      async_behavior: interactive
      input_mode: interactive
      examples:
        - regents feynman
    commands:
      - feynman
  - name: doctor
    interface: runtime
    auth_mode: none
    output_envelope: loose-object
    agent_metadata:
      category: diagnostics
      prompt_behavior: never_prompt
      json_support: supported
      mutation_class: local-read
      retry_behavior: safe
      pagination: none
      async_behavior: synchronous
      input_mode: args
      examples:
        - regents doctor
        - regents doctor xmtp
    commands:
      - doctor
      - doctor runtime
      - doctor auth
      - doctor techtree
      - doctor transports
      - doctor xmtp
      - doctor contracts
      - doctor workspace
  - name: ens
    interface: http
    auth_mode: agent-siwa
    auth_audience: platform
    output_envelope: loose-object
    note: Ethereum mainnet only. The Regent ENS name must already be attached to the authenticated agent and already resolve to that wallet. This command prepares the reverse-name transaction by default and submits only with --submit.
    agent_metadata:
      category: identity
      prompt_behavior: confirm_before_submit
      json_support: supported
      mutation_class: transaction_prepare_or_submit
      retry_behavior: retry_prepare_only
      pagination: none
      async_behavior: synchronous
      input_mode: flags
      examples:
        - regents ens set-primary --name example.eth
    commands:
      - ens set-primary
    flags:
      set-primary:
        - name: --submit
          type: boolean
          required: false
          description: Submit the prepared transaction with the local wallet.
    path_templates:
      - /api/agent-platform/ens/prepare-primary
  - name: xmtp
    interface: runtime
    auth_mode: none
    output_envelope: loose-object
    agent_metadata:
      category: messaging
      prompt_behavior: prompt_for_local_identity_changes
      json_support: supported
      mutation_class: local-and-network-write
      retry_behavior: retry_idempotent_reads
      pagination: bounded
      async_behavior: synchronous
      input_mode: args-and-flags
      examples:
        - regents xmtp status
        - regents xmtp policy get
        - regents xmtp group list
    commands:
      - xmtp init
      - xmtp status
      - xmtp resolve
      - xmtp owner add
      - xmtp owner list
      - xmtp owner remove
      - xmtp trusted add
      - xmtp trusted list
      - xmtp trusted remove
      - xmtp policy init
      - xmtp policy get
      - xmtp policy validate
      - xmtp policy edit
      - xmtp doctor
      - xmtp test dm
      - xmtp group create
      - xmtp group add-member
      - xmtp group remove-member
      - xmtp group list
      - xmtp group members
      - xmtp group permissions
      - xmtp group update-permission
      - xmtp group admins
      - xmtp group super-admins
      - xmtp group add-admin
      - xmtp group remove-admin
      - xmtp group add-super-admin
      - xmtp group remove-super-admin
      - xmtp revoke-other-installations
      - xmtp rotate-db-key
      - xmtp rotate-wallet
    rpc_methods:
      - xmtp.status
