openapi: 3.1.0
info:
  title: Regent Shared Services Contract
  version: 0.1.0
  description: >
    Source-of-truth contract for shared Regent service rails that are not product-owned.
    This file owns Regent staking plus shared operator reporting rails.
tags:
  - name: identity
  - name: auth
  - name: regent-staking
  - name: reports
paths:
  /v1/identity/status:
    post:
      operationId: getIdentityStatus
      tags: [identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityStatusRequest"
      responses:
        "200":
          description: Identity status resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityStatusResponse"
        "400":
          description: Invalid identity status request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/identity/registration-intents:
    post:
      operationId: createIdentityRegistrationIntent
      tags: [identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityRegistrationIntentRequest"
      responses:
        "200":
          description: Registration intent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityRegistrationIntentResponse"
        "400":
          description: Invalid registration intent request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/identity/registration-completions:
    post:
      operationId: completeIdentityRegistration
      tags: [identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityRegistrationCompletionRequest"
      responses:
        "200":
          description: Registration completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityRegistrationCompletionResponse"
        "400":
          description: Invalid registration completion request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Registration authorization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/identity/siwa/nonce:
    post:
      operationId: createIdentitySiwaNonce
      tags: [identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentitySiwaNonceRequest"
      responses:
        "200":
          description: SIWA nonce issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentitySiwaNonceResponse"
        "400":
          description: Invalid SIWA nonce request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/identity/siwa/verify:
    post:
      operationId: verifyIdentitySiwaSession
      tags: [identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentitySiwaVerifyRequest"
      responses:
        "200":
          description: Identity verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentitySiwaVerifyResponse"
        "400":
          description: Invalid SIWA verification request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Signature or nonce validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/agent/siwa/http-verify:
    post:
      operationId: verifySharedSiwaHttpEnvelope
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiwaHttpVerifyRequest"
      responses:
        "200":
          description: Protected request envelope verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiwaHttpVerifyResponse"
        "400":
          description: Invalid envelope request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Envelope verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /api/regent/staking:
    get:
      operationId: getRegentStakingOverview
      tags: [regent-staking]
      responses:
        "200":
          description: Staking overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegentStakingOverviewResponse"
  /api/regent/staking/account/{address}:
    get:
      operationId: getRegentStakingAccount
      tags: [regent-staking]
      parameters:
        - name: address
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Address"
      responses:
        "200":
          description: Account staking state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegentStakingAccountResponse"
  /api/regent/staking/stake:
    post:
      operationId: stakeRegent
      tags: [regent-staking]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AmountRequest"
      responses:
        "200":
          description: Stake prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /api/regent/staking/unstake:
    post:
      operationId: unstakeRegent
      tags: [regent-staking]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AmountRequest"
      responses:
        "200":
          description: Unstake prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /api/regent/staking/claim-usdc:
    post:
      operationId: claimRegentStakingUsdc
      tags: [regent-staking]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: Claim prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /api/regent/staking/claim-regent:
    post:
      operationId: claimRegentStakingRegent
      tags: [regent-staking]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: Regent claim prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /api/regent/staking/claim-and-restake-regent:
    post:
      operationId: claimAndRestakeRegentStakingRegent
      tags: [regent-staking]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: Regent claim and restake prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /v1/agent/regent/staking:
    get:
      operationId: getAgentRegentStakingOverview
      tags: [regent-staking]
      security: [{ AgentSiwaHeaders: [] }]
      responses:
        "200":
          description: Staking overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegentStakingOverviewResponse"
  /v1/agent/regent/staking/account/{address}:
    get:
      operationId: getAgentRegentStakingAccount
      tags: [regent-staking]
      security: [{ AgentSiwaHeaders: [] }]
      parameters:
        - name: address
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Address"
      responses:
        "200":
          description: Account staking state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegentStakingAccountResponse"
  /v1/agent/regent/staking/stake:
    post:
      operationId: stakeAgentRegent
      tags: [regent-staking]
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AmountRequest"
      responses:
        "200":
          description: Stake prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /v1/agent/regent/staking/unstake:
    post:
      operationId: unstakeAgentRegent
      tags: [regent-staking]
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AmountRequest"
      responses:
        "200":
          description: Unstake prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /v1/agent/regent/staking/claim-usdc:
    post:
      operationId: claimAgentRegentStakingUsdc
      tags: [regent-staking]
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: Claim prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /v1/agent/regent/staking/claim-regent:
    post:
      operationId: claimAgentRegentStakingRegent
      tags: [regent-staking]
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: Regent claim prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /v1/agent/regent/staking/claim-and-restake-regent:
    post:
      operationId: claimAndRestakeAgentRegentStakingRegent
      tags: [regent-staking]
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: Regent claim and restake prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /api/regent/staking/deposit-usdc/prepare:
    post:
      operationId: prepareRegentStakingDepositUsdc
      tags: [regent-staking]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepositUsdcRequest"
      responses:
        "200":
          description: Deposit prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /api/regent/staking/withdraw-treasury/prepare:
    post:
      operationId: prepareRegentStakingTreasuryWithdraw
      tags: [regent-staking]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawTreasuryRequest"
      responses:
        "200":
          description: Treasury withdraw prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /v1/agent/bug-report:
    post:
      operationId: createAgentBugReport
      tags: [reports]
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BugReportRequest"
      responses:
        "200":
          description: Bug report stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BugReportResponse"
        "400":
          description: Invalid report payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/agent/security-report:
    post:
      operationId: createAgentSecurityReport
      tags: [reports]
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecurityReportRequest"
      responses:
        "200":
          description: Security report stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityReportResponse"
        "400":
          description: Invalid report payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
components:
  securitySchemes:
    AgentSiwaHeaders:
      type: apiKey
      in: header
      name: x-regent-agent-address
      description: >
        Placeholder for the signed SIWA header bundle used by authenticated agent requests.
        The concrete header set is carried by the CLI request signer.
    PrivySessionCookie:
      type: apiKey
      in: cookie
      name: _autolaunch_key
  schemas:
    Address:
      type: string
      pattern: "^0x[a-fA-F0-9]{40}$"
    HexData:
      type: string
      pattern: "^0x[a-fA-F0-9]*$"
    DecimalString:
      type: string
    IdentityNetwork:
      type: string
      enum: [base, base-sepolia]
    IdentityProvider:
      type: string
      enum: [regent, moonpay, bankr, privy]
    IdentityVerificationStatus:
      type: string
      enum: [unregistered, onchain]
    IdentityStatusRequest:
      type: object
      required: [network, address, provider]
      properties:
        network:
          $ref: "#/components/schemas/IdentityNetwork"
        address:
          $ref: "#/components/schemas/Address"
        provider:
          $ref: "#/components/schemas/IdentityProvider"
        wallet_hint:
          type: string
      additionalProperties: false
    IdentityStatusResponse:
      type: object
      required: [ok, code, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        code:
          type: string
          enum: [identity_status_resolved]
        data:
          type: object
          required: [network, address, provider, registered, verified]
          properties:
            network:
              $ref: "#/components/schemas/IdentityNetwork"
            address:
              $ref: "#/components/schemas/Address"
            provider:
              $ref: "#/components/schemas/IdentityProvider"
            registered:
              type: boolean
            verified:
              $ref: "#/components/schemas/IdentityVerificationStatus"
            agent_id:
              type: integer
            agent_registry:
              type: string
            receipt_expires_at:
              type: string
              format: date-time
          additionalProperties: false
        meta:
          $ref: "#/components/schemas/LooseObject"
      additionalProperties: false
    IdentityRegistrationIntentRequest:
      type: object
      required: [network, address, provider]
      properties:
        network:
          $ref: "#/components/schemas/IdentityNetwork"
        address:
          $ref: "#/components/schemas/Address"
        provider:
          $ref: "#/components/schemas/IdentityProvider"
        wallet_hint:
          type: string
      additionalProperties: false
    IdentityRegistrationIntentResponse:
      type: object
      required: [ok, code, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        code:
          type: string
          enum: [identity_registration_intent_created]
        data:
          type: object
          required: [intent_id, intent_kind, signing_payload]
          properties:
            intent_id:
              type: string
            intent_kind:
              type: string
            signing_payload:
              type: object
              required: [message]
              properties:
                message:
                  type: string
              additionalProperties: true
          additionalProperties: false
        meta:
          $ref: "#/components/schemas/LooseObject"
      additionalProperties: false
    IdentityRegistrationCompletionRequest:
      type: object
      required: [intent_id, signature, address]
      properties:
        intent_id:
          type: string
        message:
          type: string
        signature:
          $ref: "#/components/schemas/HexData"
        address:
          $ref: "#/components/schemas/Address"
      additionalProperties: false
    IdentityRegistrationCompletionResponse:
      type: object
      required: [ok, code, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        code:
          type: string
          enum: [identity_registration_completed]
        data:
          type: object
          required: [registered, agent_id, agent_registry]
          properties:
            registered:
              type: boolean
              enum: [true]
            agent_id:
              type: integer
            agent_registry:
              type: string
          additionalProperties: false
        meta:
          $ref: "#/components/schemas/LooseObject"
      additionalProperties: false
    IdentitySiwaNonceRequest:
      type: object
      required: [network, address, agent_id, agent_registry]
      properties:
        network:
          $ref: "#/components/schemas/IdentityNetwork"
        address:
          $ref: "#/components/schemas/Address"
        agent_id:
          type: integer
        agent_registry:
          type: string
      additionalProperties: false
    IdentitySiwaNonceResponse:
      type: object
      required: [ok, code, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        code:
          type: string
          enum: [identity_siwa_nonce_issued]
        data:
          type: object
          required: [nonce_token, message, address, agent_id, agent_registry, expires_at]
          properties:
            nonce_token:
              type: string
            message:
              type: string
            address:
              $ref: "#/components/schemas/Address"
            agent_id:
              type: integer
            agent_registry:
              type: string
            expires_at:
              type: string
              format: date-time
          additionalProperties: false
        meta:
          $ref: "#/components/schemas/LooseObject"
      additionalProperties: false
    IdentitySiwaVerifyRequest:
      type: object
      required: [network, message, signature, nonce_token]
      properties:
        network:
          $ref: "#/components/schemas/IdentityNetwork"
        address:
          $ref: "#/components/schemas/Address"
        agent_id:
          type: integer
        agent_registry:
          type: string
        message:
          type: string
        signature:
          $ref: "#/components/schemas/HexData"
        nonce_token:
          type: string
      additionalProperties: false
    IdentitySiwaVerifyResponse:
      type: object
      required: [ok, code, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        code:
          type: string
          enum: [identity_siwa_verified]
        data:
          type: object
          required: [verified, network, address, agent_id, agent_registry, signer_type, receipt, receipt_issued_at, receipt_expires_at]
          properties:
            verified:
              $ref: "#/components/schemas/IdentityVerificationStatus"
            network:
              $ref: "#/components/schemas/IdentityNetwork"
            address:
              $ref: "#/components/schemas/Address"
            agent_id:
              type: integer
            agent_registry:
              type: string
            signer_type:
              type: string
            receipt:
              type: string
            receipt_issued_at:
              type: string
              format: date-time
            receipt_expires_at:
              type: string
              format: date-time
          additionalProperties: false
        meta:
          $ref: "#/components/schemas/LooseObject"
      additionalProperties: false
    SiwaHttpVerifyRequest:
      type: object
      required: [method, path, headers]
      properties:
        method:
          type: string
        path:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        raw_body:
          type: string
        body_digest:
          type: string
      additionalProperties: false
    SiwaHttpVerifyResponse:
      type: object
      required: [ok, code, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        code:
          type: string
          enum: [http_envelope_valid]
        data:
          type: object
          required: [verified, walletAddress, chainId, keyId, receiptExpiresAt, requiredHeaders, requiredCoveredComponents, coveredComponents]
          properties:
            verified:
              type: boolean
              enum: [true]
            walletAddress:
              $ref: "#/components/schemas/Address"
            chainId:
              type: integer
            keyId:
              type: string
            receiptExpiresAt:
              type: string
              format: date-time
            requiredHeaders:
              type: array
              items:
                type: string
            requiredCoveredComponents:
              type: array
              items:
                type: string
            coveredComponents:
              type: array
              items:
                type: string
          additionalProperties: false
        meta:
          $ref: "#/components/schemas/LooseObject"
      additionalProperties: false
    ReportStatus:
      type: string
      enum: [pending, fixed, won't fix, duplicate]
    ReportingAgent:
      type: object
      required: [wallet_address, chain_id, registry_address, token_id]
      properties:
        wallet_address:
          $ref: "#/components/schemas/Address"
        chain_id:
          type: integer
        registry_address:
          $ref: "#/components/schemas/Address"
        token_id:
          type: string
        label:
          type: string
      additionalProperties: false
    BugReportRequest:
      type: object
      required: [summary, details, reporting_agent]
      properties:
        summary:
          type: string
        details:
          type: string
        reporting_agent:
          $ref: "#/components/schemas/ReportingAgent"
      additionalProperties: false
    SecurityReportRequest:
      type: object
      required: [summary, details, contact, reporting_agent]
      properties:
        summary:
          type: string
        details:
          type: string
        contact:
          type: string
        reporting_agent:
          $ref: "#/components/schemas/ReportingAgent"
      additionalProperties: false
    BugReportRecord:
      type: object
      required: [report_id, summary, details, status, reporting_agent, created_at]
      properties:
        report_id:
          type: string
        summary:
          type: string
        details:
          type: string
        status:
          $ref: "#/components/schemas/ReportStatus"
        reporting_agent:
          $ref: "#/components/schemas/ReportingAgent"
        created_at:
          type: string
          format: date-time
      additionalProperties: false
    SecurityReportRecord:
      type: object
      required: [report_id, summary, details, contact, reporting_agent, created_at]
      properties:
        report_id:
          type: string
        summary:
          type: string
        details:
          type: string
        contact:
          type: string
        reporting_agent:
          $ref: "#/components/schemas/ReportingAgent"
        created_at:
          type: string
          format: date-time
      additionalProperties: false
    BugReportResponse:
      type: object
      required: [ok, message, public_url, report]
      properties:
        ok:
          type: boolean
          enum: [true]
        message:
          type: string
        public_url:
          type: string
        report:
          $ref: "#/components/schemas/BugReportRecord"
      additionalProperties: false
    SecurityReportResponse:
      type: object
      required: [ok, message, report]
      properties:
        ok:
          type: boolean
          enum: [true]
        message:
          type: string
        report:
          $ref: "#/components/schemas/SecurityReportRecord"
      additionalProperties: false
    LooseObject:
      type: object
      additionalProperties: true
    ServiceError:
      type: object
      required: [code, message]
      additionalProperties: true
      properties:
        code:
          type: string
        message:
          type: string
    ErrorEnvelope:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          $ref: "#/components/schemas/ServiceError"
      additionalProperties: true
    AmountRequest:
      type: object
      required: [amount]
      properties:
        amount:
          $ref: "#/components/schemas/DecimalString"
      additionalProperties: false
    DepositUsdcRequest:
      type: object
      required: [amount, source_tag, source_ref]
      properties:
        amount:
          $ref: "#/components/schemas/DecimalString"
        source_tag:
          type: string
        source_ref:
          type: string
      additionalProperties: false
    WithdrawTreasuryRequest:
      type: object
      required: [amount]
      properties:
        amount:
          $ref: "#/components/schemas/DecimalString"
        recipient:
          $ref: "#/components/schemas/Address"
      additionalProperties: false
    TxRequest:
      type: object
      properties:
        chain_id:
          type: integer
        to:
          $ref: "#/components/schemas/Address"
        value:
          type: string
        data:
          $ref: "#/components/schemas/HexData"
      additionalProperties: true
    PreparedAction:
      type: object
      properties:
        resource:
          type: string
        action:
          type: string
        chain_id:
          type: integer
        target:
          $ref: "#/components/schemas/Address"
        calldata:
          $ref: "#/components/schemas/HexData"
        tx_request:
          $ref: "#/components/schemas/TxRequest"
      additionalProperties: true
    PreparedActionResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]
