name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: regent-cli
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          path: regent-cli

      - name: Check out Techtree contract source
        uses: actions/checkout@v4
        with:
          repository: regent-ai/techtree
          path: techtree

      - name: Check out Autolaunch contract source
        uses: actions/checkout@v4
        with:
          repository: regent-ai/autolaunch
          path: autolaunch

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated OpenAPI files
        run: pnpm check:openapi

      - name: Build workspace
        run: pnpm build

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Check packed CLI contents
        run: pnpm check:pack-cli-contents

      - name: Run packed install smoke
        run: pnpm test:pack-smoke
